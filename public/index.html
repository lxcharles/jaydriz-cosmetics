      // 2. CHILD LAYOUT INTERFACES
      function HeroSection({ onShopNowClick }) {
        const [currentSlide, setCurrentSlide] = useState(0);

            setCurrentSlide((prev) => (prev + 1) % HERO_SLIDES.length);

          return () => clearInterval(interval);
        }, []);

        const slide = HERO_SLIDES[currentSlide];

        return (
          <section className="relative h-[70vh] flex items-center justify-center overflow-hidden bg-black text-white">
            <div className="absolute inset-0 z-0 opacity-70">
              <img src={slide.image} className="w-full h-full object-cover object-center transition-all duration-1000" alt="Hero" />

      function Shop({ onSelectProduct, searchQuery, onClearSearch }) {
        const [activeCategory, setActiveCategory] = useState("All");

        const filtered = PRODUCTS.filter((p) => {
          const matchesCategory = activeCategory === "All" || p.category === activeCategory;
          const matchesQuery = !searchQuery || p.name.toLowerCase().includes(searchQuery.toLowerCase());
          return matchesCategory && matchesQuery;
        });

        return (
          <section className="py-12 px-6 max-w-7xl mx-auto">
            <div className="text-center mb-10">
              <span className="text-xs uppercase font-bold text-[#806B5F]" style={{ tracking: '0.3em' }}>EXPLORE</span>
              <h2 className="text-2xl font-bold uppercase mt-1 text-black" style={{ tracking: '0.1em' }}>OUR LINEUP</h2>
            </div>

            <div className="flex justify-center space-x-2 mb-8 overflow-x-auto no-scrollbar py-2">
              {["All", "Face", "Eyes", "Artistry"].map((cat) => (
                <button key={cat} onClick={() => setActiveCategory(cat)} className={`px-5 py-2 text-[10px] font-bold uppercase transition-all ${activeCategory === cat ? "bg-black text-white" : "bg-white text-neutral-500 border border-neutral-200"}`} style={{ tracking: '0.1em' }}>
                  {cat}
                </button>
              ))}
            </div>

            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
              {filtered.map((prod) => (
                <div key={prod.id} onClick={() => onSelectProduct(prod)} className="group cursor-pointer bg-white overflow-hidden flex flex-col justify-between border border-neutral-100 rounded-sm shadow-sm hover:shadow-md transition-all">
                  <div className="relative aspect-[4/5] bg-neutral-50 overflow-hidden">
                    <img src={prod.image} alt={prod.name} className="w-full h-full object-cover object-center transition-transform duration-500 transform group-hover:scale-105" />
                  </div>
                  <div className="p-4 flex flex-col flex-grow justify-between border-t border-neutral-50">
                    <div>
                      <span className="text-[9px] uppercase font-bold text-[#806B5F]" style={{ tracking: '0.1em' }}>{prod.category}</span>
                      <h3 className="text-xs sm:text-sm text-black font-semibold uppercase mt-0.5 truncate" style={{ tracking: '0.05em' }}>{prod.name}</h3>
                    </div>
                    <div className="flex items-center justify-between mt-3 pt-2">

                target="_blank" 
                rel="noopener noreferrer"
                className="text-xs tracking-wider text-neutral-500 hover:text-black font-semibold uppercase inline-flex items-center space-x-1.5 transition-colors"

                <i data-lucide="external-link" className="w-3.5 h-3.5"></i>
              </a>
            </div>
          </section>
        );
      }

      function ProductDetail({ product, onBack, onAddToCart, onDirectWhatsAppCheckout }) {
        const [shadeQuantities, setShadeQuantities] = useState({});
        const [baseQuantity, setBaseQuantity] = useState(1);

        const totalItemsCount = product.shades 
          ? Object.values(shadeQuantities).reduce((acc, qty) => acc + qty, 0)
          : baseQuantity;

        const totalProductPrice = product.price * totalItemsCount;

        const handleShadeToggle = (shade) => {
          setShadeQuantities(prev => {
            const next = { ...prev };
            if (next[shade]) {
              delete next[shade];
            } else {
              next[shade] = 1;
            }
            return next;
          });
        };

        const handleShadeQuantityChange = (shade, change) => {
          setShadeQuantities(prev => {
            const next = { ...prev };
            if (!next[shade]) return prev;
            const updatedQty = next[shade] + change;
            if (updatedQty <= 0) {
              delete next[shade];
            } else {
              next[shade] = updatedQty;
            }
            return next;
          });
        };

        const executeAddToCart = () => {
          if (product.shades) {
            const activeSelections = Object.entries(shadeQuantities);
            if (activeSelections.length === 0) {
              alert("Please select at least one shade variant first.");
              return;
            }
            activeSelections.forEach(([shade, qty]) => {
              onAddToCart(product, qty, shade);
            });
            setShadeQuantities({});
          } else {
            onAddToCart(product, baseQuantity, null);
            setBaseQuantity(1);
          }
        };

        const executeDirectWhatsApp = () => {
          if (product.shades && Object.keys(shadeQuantities).length === 0) {
            alert("Please select at least one shade variant first.");
            return;
          }
          onDirectWhatsAppCheckout(product, baseQuantity, shadeQuantities);
        };

        return (
          <section className="py-8 px-6 max-w-5xl mx-auto bg-white border border-neutral-200 my-6 rounded-sm">
            <button onClick={onBack} className="text-[10px] font-bold uppercase text-neutral-400 hover:text-black mb-6 block" style={{ tracking: '0.2em' }}>{"←"} Back to Shop</button>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
              <div className="aspect-[4/5] bg-neutral-50 border border-neutral-100 rounded-sm overflow-hidden">
                <img src={product.image} alt={product.name} className="w-full h-full object-cover" />
              </div>
              <div className="flex flex-col space-y-6">
                <div>
                  <span className="text-[10px] uppercase font-bold text-[#806B5F]" style={{ tracking: '0.2em' }}>{product.category}</span>
                  <h1 className="text-2xl font-bold uppercase text-black mt-1 mb-2" style={{ tracking: '0.1em' }}>{product.name}</h1>
                  <span className="text-xl font-bold text-[#806B5F]">₦{product.price.toLocaleString()}</span>
                </div>
                <div className="border-t border-neutral-100 pt-4">
                  <h3 className="text-[10px] uppercase font-bold text-neutral-400 mb-2" style={{ tracking: '0.2em' }}>Description</h3>
                  <p className="text-xs text-neutral-600 leading-relaxed">{product.description}</p>
                </div>

                {product.shades && (
                  <div className="space-y-4">
                    <h3 className="text-[10px] uppercase font-bold text-neutral-400" style={{ tracking: '0.2em' }}>
                      Select Shades <span className="text-neutral-500 normal-case">(Tap multiple to select)</span>
                    </h3>
                    <div className="flex flex-wrap gap-2">
                      {product.shades.map((shade) => {
                        const isSelected = !!shadeQuantities[shade];
                        return (
                          <button 
                            key={shade} 
                            onClick={() => handleShadeToggle(shade)} 
                            className={`w-8 h-8 rounded-full border relative transition-all ${isSelected ? "ring-2 ring-black transform scale-105" : "border-neutral-300 opacity-75 hover:opacity-100"}`} 
                            style={{ backgroundColor: shade }}
                            title={SHADE_NAMES[shade]}
                          >
                            {isSelected && (
                              <span className="absolute inset-0 flex items-center justify-center bg-black/20 text-white font-bold text-[10px] rounded-full">
                                ✓
                              </span>
                            )}
                          </button>
                        );
                      })}
                    </div>

                    {Object.keys(shadeQuantities).length > 0 && (
                      <div className="border-t border-neutral-100 pt-3 mt-2 space-y-2">
                        <h4 className="text-[9px] uppercase font-bold text-neutral-400" style={{ tracking: '0.1em' }}>Selected Quantities:</h4>
                        {Object.entries(shadeQuantities).map(([shade, qty]) => (
                          <div key={shade} className="flex items-center justify-between bg-neutral-50 p-2 rounded-sm border border-neutral-100">
                            <div className="flex items-center space-x-2">
                              <span className="w-3 h-3 rounded-full border border-neutral-300" style={{ backgroundColor: shade }} />
                              <span className="text-xs font-medium text-black">{SHADE_NAMES[shade] || shade}</span>
                            </div>
                            <div className="flex items-center border border-neutral-300 bg-white">
                              <button onClick={() => handleShadeQuantityChange(shade, -1)} className="px-2 py-0.5 font-bold text-neutral-500 hover:text-black text-xs">-</button>
                              <span className="w-8 text-center text-xs font-bold text-black">{qty}</span>
                              <button onClick={() => handleShadeQuantityChange(shade, 1)} className="px-2 py-0.5 font-bold text-neutral-500 hover:text-black text-xs">+</button>
                            </div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                )}

                {!product.shades && (
                  <div className="space-y-2">
                    <h3 className="text-[10px] uppercase font-bold text-neutral-400" style={{ tracking: '0.2em' }}>Quantity</h3>
                    <div className="flex items-center w-28 border border-neutral-300 bg-white">
                      <button onClick={() => baseQuantity > 1 && setBaseQuantity(baseQuantity - 1)} className="px-3 py-1 font-bold text-neutral-500 hover:text-black">-</button>
                      <span className="flex-1 text-center text-xs font-bold text-black">{baseQuantity}</span>
                      <button onClick={() => setBaseQuantity(baseQuantity + 1)} className="px-3 py-1 font-bold text-neutral-500 hover:text-black">+</button>
                    </div>
                  </div>
                )}

                <div className="space-y-2 border-t border-neutral-100 pt-4">
                  <button onClick={executeAddToCart} className="w-full bg-black text-white text-[10px] font-bold uppercase py-4 hover:bg-neutral-800 transition-colors shadow-md flex items-center justify-center space-x-2" style={{ tracking: '0.2em' }}>
                    <i data-lucide="shopping-bag" className="w-3.5 h-3.5"></i>
                    <span>Add To Shopping Cart • ₦{totalProductPrice.toLocaleString()}</span>
                  </button>
                  
                  <button onClick={executeDirectWhatsApp} className="w-full bg-green-500 text-white text-[10px] font-bold uppercase py-4 hover:bg-green-600 transition-colors flex items-center justify-center space-x-2 shadow-sm" style={{ tracking: '0.2em' }}>
                    <i data-lucide="message-square" className="w-3.5 h-3.5"></i>
                    <span>Order via WhatsApp Now</span>
                  </button>
                </div>
              </div>
            </div>
          </section>
        );
      }

                <div className="w-12 h-[1px] bg-white/50 mx-auto"></div>
              </div>
            </div>

            <div className="max-w-5xl mx-auto px-6 py-16 space-y-20 text-left">
              <div className="grid grid-cols-1 md:grid-cols-12 gap-8 md:gap-12 items-center">
                <div className="md:col-span-7 space-y-4">
                  <span className="text-[10px] uppercase text-[#806B5F] font-bold block" style={{ tracking: '0.25em' }}>About The Brand</span>

                  <p className="text-xs sm:text-sm text-neutral-600 leading-relaxed font-light">
                    Jaydriz Cosmetics is a trailblazing beauty brand designed for the modern makeup enthusiast who refuses to compromise on quality or cost. Merging high-performance formulas with trend-driven innovation, the brand delivers an inclusive, pro-level beauty experience that empowers self-expression for every skin tone and type.
                  </p>
                </div>
                <div className="md:col-span-5 aspect-[4/5] bg-neutral-200 shadow-sm border border-neutral-100 overflow-hidden rounded-sm">
                  <img src="https://res.cloudinary.com/dehvk3bre/image/upload/v1780414851/Face_octrtg.png" className="w-full h-full object-cover transform hover:scale-105 transition-transform duration-700" alt="Complexion" />
                </div>
              </div>

              <div className="bg-white border border-neutral-200 p-8 sm:p-12 rounded-sm grid grid-cols-1 lg:grid-cols-12 gap-8 items-center shadow-sm">
                <div className="lg:col-span-12 space-y-4">
                  <span className="text-[10px] uppercase text-[#806B5F] font-bold block text-center lg:text-left" style={{ tracking: '0.25em' }}>Our Mission Statement</span>
                  <h2 className="font-serif text-2xl text-black font-bold tracking-wide text-center lg:text-left">The Core Philosophy</h2>
                  <p className="text-xs sm:text-sm text-neutral-700 leading-relaxed font-light">
                    At the heart of Jaydriz Cosmetics is a disruptive promise: <strong className="text-black font-bold">luxury meets affordability.</strong>
                  </p>
                  <p className="text-xs sm:text-sm text-neutral-600 leading-relaxed font-light">
                    Historically, consumers had to choose between prestige department store prices or sacrificing quality for drugstore budget-friendliness. Jaydriz Cosmetics obliterates that divide. By sourcing premium, skin-loving ingredients and utilizing cutting-edge manufacturing, the brand delivers the weightless textures, rich pigment payoffs, and all-day staying power characteristic of high-end luxury beauty—all at a price point that remains accessible.
                  </p>
                </div>
              </div>

              <div className="space-y-8">
                <div className="text-center md:text-left">
                  <span className="text-[10px] uppercase text-[#806B5F] font-bold block" style={{ tracking: '0.25em' }}>Curated Creations</span>
                  <h2 className="font-serif text-2xl sm:text-3xl text-black font-bold tracking-wide mt-1">Product Portfolio Highlights</h2>
                </div>
                
                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                  <div className="bg-white border border-neutral-100 p-6 flex flex-col justify-between space-y-4 rounded-sm shadow-sm">
                    <div className="space-y-2">
                      <div className="w-6 h-6 rounded-full bg-[#FAF7F5] flex items-center justify-center text-[10px] font-bold font-serif text-[#806B5F]">1</div>
                      <h4 className="text-xs font-bold uppercase text-black" style={{ tracking: '0.1em' }}>Complexion Perfection</h4>
                      <p className="text-xs text-neutral-500 leading-relaxed font-light">
                        From breathable, second-skin foundations available in an expansive, meticulously calibrated shade range to blurring, ultra-refined setting powders that eliminate flashback, the complexion line is engineered for a camera-ready, real-life finish.
                      </p>
                    </div>
                  </div>

                  <div className="bg-white border border-neutral-100 p-6 flex flex-col justify-between space-y-4 rounded-sm shadow-sm">
                    <div className="space-y-2">
                      <div className="w-6 h-6 rounded-full bg-[#FAF7F5] flex items-center justify-center text-[10px] font-bold font-serif text-[#806B5F]">2</div>
                      <h4 className="text-xs font-bold uppercase text-black" style={{ tracking: '0.1em' }}>Trend-Driven Innovation</h4>
                      <p className="text-xs text-neutral-500 leading-relaxed font-light">
                        Constantly pivoting with the pulse of global beauty trends, Jaydriz Cosmetics offers everything from viral, high-octane liquid highlighters to butter-soft eyeshadow palettes that deliver maximum payoff with minimal effort.
                      </p>
                    </div>
                  </div>

                  <div className="bg-white border border-neutral-100 p-6 flex flex-col justify-between space-y-4 rounded-sm shadow-sm">
                    <div className="space-y-2">
                      <div className="w-6 h-6 rounded-full bg-[#FAF7F5] flex items-center justify-center text-[10px] font-bold font-serif text-[#806B5F]">3</div>
                      <h4 className="text-xs font-bold uppercase text-black" style={{ tracking: '0.1em' }}>Inclusivity & Empowerment</h4>
                      <p className="text-xs text-neutral-500 leading-relaxed font-light">
                        Every product is crafted with diverse undertones in mind, ensuring that beauty is never exclusive, but a universal tool for confidence and self-celebration.
                      </p>
                    </div>
                  </div>
                </div>
              </div>

              <div className="relative bg-black text-white p-8 sm:p-12 text-center rounded-sm overflow-hidden shadow-xl">
                <div className="absolute inset-0 z-0 opacity-20">
                  <img src="https://res.cloudinary.com/dehvk3bre/image/upload/v1780415231/20260331_085939_0000_npvhz9.png" className="w-full h-full object-cover" alt="Manifesto Base" />
                </div>
                <div className="relative z-10 max-w-2xl mx-auto space-y-4">
                  <span className="text-[9px] uppercase text-yellow-500 font-extrabold block" style={{ tracking: '0.4em' }}>The Jaydriz Manifesto</span>
                  <p className="font-serif italic text-sm sm:text-lg text-neutral-100 leading-relaxed font-light">
                    "We believe that luxury shouldn't be a luxury. True beauty is inclusive, empowering, and accessible to all. With Jaydriz Cosmetics, you don't just wear makeup—you command your canvas without compromise."
                  </p>
                  <div className="w-8 h-[1px] bg-yellow-500/50 mx-auto mt-4"></div>
                </div>
              </div>
            </div>
          </section>
        );
      }

      function ContactPage() {
        return (
          <section className="py-16 px-6 max-w-5xl mx-auto text-center">
            <h1 className="font-serif text-3xl font-bold uppercase tracking-wider mb-8 text-black">Visit Our Store</h1>
            
            <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 items-stretch text-left">
              <div className="lg:col-span-5 bg-white p-8 border border-neutral-200 rounded-sm shadow-sm flex flex-col justify-between">
                <div>
                  <h3 className="text-xs uppercase font-bold text-[#806B5F] mb-2" style={{ tracking: '0.2em' }}>Main Headquarters</h3>
                  <p className="text-xs text-neutral-800 leading-relaxed mb-6">
                    Shop B012, Rivers Plaza II,<br />
                    Lagos Trade Fair Plaza,<br />
                    Off Lagos - Badagry Expressway,<br />
                    Lagos, Nigeria.
                  </p>
                  <h3 className="text-xs uppercase font-bold text-[#806B5F] mb-1" style={{ tracking: '0.2em' }}>Direct Support</h3>
                  <p className="text-xs text-neutral-800 mb-6">WhatsApp: <span className="font-bold text-black">+234 803 539 9521</span></p>
                </div>
                <a href="https://wa.me/2348035399521" target="_blank" className="block text-center w-full bg-black text-white font-bold text-[10px] py-3.5 uppercase hover:bg-neutral-800 transition-colors" style={{ tracking: '0.2em' }}>Chat Directly</a>
              </div>

              <div className="lg:col-span-7 bg-white p-2 border border-neutral-200 rounded-sm shadow-sm min-h-[350px] relative overflow-hidden">
                <iframe 
                  src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3964.3854190870983!2d3.2255531!3d6.4727771!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x103b879ec3116819%3A0xe7f98722a2757a2e!2sLagos%20Trade%20Fair%20Complex!5e0!3m2!1sen!2sng!4v1717900000000!5m2!1sen!2sng" 
                  className="w-full h-full min-h-[350px] border-0 rounded-sm"
                  allowFullScreen="" 
                  loading="lazy" 
                  referrerPolicy="no-referrer-when-downgrade"
                ></iframe>
              </div>
            </div>
          </section>
        );
      }

      function App() {
        const [loading, setLoading] = useState(true);
        const [currentPage, setCurrentPage] = useState("home");
        const [selectedProduct, setSelectedProduct] = useState(null);
        const [searchQuery, setSearchQuery] = useState("");
        const [cart, setCart] = useState([]);
        const [isCartOpen, setIsCartOpen] = useState(false);
        const [isMenuOpen, setIsMenuOpen] = useState(false);

        useEffect(() => {
          const timer = setTimeout(() => {
            setLoading(false);
            setTimeout(() => { if (window.lucide) window.lucide.createIcons(); }, 50);
          }, 800);
          return () => clearTimeout(timer);
        }, []);

        useEffect(() => {
          if (window.lucide) window.lucide.createIcons();
        }, [currentPage, selectedProduct, isCartOpen, isMenuOpen, cart]);

        const handleAddToCart = (product, qty, shade) => {
          setCart((prev) => {
            const existingIndex = prev.findIndex(item => item.product.id === product.id && item.shade === shade);
            if (existingIndex > -1) {
              const updated = [...prev];
              updated[existingIndex].quantity += qty;
              return updated;
            }
            return [...prev, { product, quantity: qty, shade }];
          });
          setIsCartOpen(true);
        };

        const handleRemoveFromCart = (index) => {
          setCart(prev => prev.filter((_, i) => i !== index));
        };

        const totalCartPrice = cart.reduce((acc, item) => acc + (item.product.price * item.quantity), 0);
        const totalItemsCount = cart.reduce((acc, item) => acc + item.quantity, 0);

        const handleCheckout = () => {
          let message = `🛍️ JAYDRIZ COSMETICS - MULTI-ITEM ORDER%0A%0A`;
          cart.forEach((item, index) => {
            const shadeString = item.shade ? ` (${SHADE_NAMES[item.shade] || item.shade})` : "";
            message += `${index + 1}. *${item.product.name}*${shadeString}%0A   Qty: ${item.quantity} x ₦${item.product.price.toLocaleString()} = ₦${(item.product.price * item.quantity).toLocaleString()}%0A%0A`;
          });
          message += `*Grand Total Price:* ₦${totalCartPrice.toLocaleString()}%0A%0AKindly process my order summary above and send details.`;
          window.open(`https://wa.me/2348035399521?text=${message}`, "_blank");
        };

        const handleDirectWhatsAppCheckout = (product, fallbackQty, shadeQuantities) => {
          let message = `🛍️ JAYDRIZ COSMETICS - DIRECT PRODUCT ORDER%0A%0A`;
          let totalCalculatedPrice = 0;

          if (product.shades) {
            Object.entries(shadeQuantities).forEach(([shade, qty], index) => {
              const itemTotal = product.price * qty;
              totalCalculatedPrice += itemTotal;
              const nameOfShade = SHADE_NAMES[shade] || shade;
              message += `${index + 1}. *${product.name}* (${nameOfShade})%0A   Qty: ${qty} x ₦${product.price.toLocaleString()} = ₦${itemTotal.toLocaleString()}%0A%0A`;
            });
          } else {
            totalCalculatedPrice = product.price * fallbackQty;
            message += `1. *${product.name}*%0A   Qty: ${fallbackQty} x ₦${product.price.toLocaleString()} = ₦${totalCalculatedPrice.toLocaleString()}%0A%0A`;
          }

          message += `*Total Price:* ₦${totalCalculatedPrice.toLocaleString()}%0A%0AKindly check availability and process this order layout.`;
          window.open(`https://wa.me/2348035399521?text=${message}`, "_blank");
        };

        const navigateTo = (page) => {
          setCurrentPage(page);
          setSelectedProduct(null);
          setIsMenuOpen(false);
          window.scrollTo({ top: 0 });
        };

        if (loading) {
          return (
            <div className="fixed inset-0 bg-white z-[9999] flex flex-col items-center justify-center">
              <img src="https://res.cloudinary.com/dehvk3bre/image/upload/v1780414377/20260409_010010_u4nssj.png" className="w-24 h-24 object-contain mb-4 animate-pulse" alt="Logo" />
              <p className="text-[9px] text-neutral-600 font-bold uppercase" style={{ tracking: '0.4em' }}>Luxury Artistry Loading...</p>
            </div>
          );
        }

        return (
          <div className="min-h-screen bg-[#FAF7F5] flex flex-col justify-between relative overflow-x-hidden">
            <div>
              <header className="sticky top-0 bg-[#FAF7F5] bg-opacity-90 border-b border-neutral-200 z-40 px-6 py-4 flex justify-between items-center" style={{ backdropFilter: 'blur(8px)' }}>
                <div className="flex items-center space-x-2">
                  <button onClick={() => setIsMenuOpen(!isMenuOpen)} className="p-1 rounded-sm text-black hover:bg-neutral-200">
                    <i data-lucide="menu" className="w-5 h-5"></i>
                  </button>
                  <span onClick={() => navigateTo("home")} className="font-serif text-lg font-extrabold cursor-pointer ml-1 text-black" style={{ tracking: '0.2em' }}>JAYDRIZ</span>
                </div>

                <div className="flex items-center space-x-4">
                  <input type="text" placeholder="Search product..." value={searchQuery} onChange={(e) => { setSearchQuery(e.target.value); if(currentPage !== 'home') setCurrentPage('home'); }} className="border border-neutral-300 text-black rounded-sm text-xs px-3 py-1.5 bg-white focus:outline-none max-w-[120px] sm:max-w-[160px]" />
                  
                  <button onClick={() => setIsCartOpen(true)} className="relative p-1 text-black flex items-center">
                    <i data-lucide="shopping-bag" className="w-5 h-5"></i>
                    {totalItemsCount > 0 && (
                      <span className="absolute -top-1 -right-1 bg-black text-white font-bold text-[8px] w-4 h-4 rounded-full flex items-center justify-center shadow-sm">
                        {totalItemsCount}
                      </span>
                    )}
                  </button>
                </div>
              </header>

              {isMenuOpen && (
                <div className="fixed inset-0 bg-black bg-opacity-40 z-50 transition-opacity" onClick={() => setIsMenuOpen(false)}>
                  <div className="w-64 bg-[#FAF7F5] h-full p-6 flex flex-col justify-between shadow-2xl text-black" onClick={(e) => e.stopPropagation()}>
                    <div>
                      <div className="flex justify-between items-center mb-8 pb-4 border-b border-neutral-200">
                        <span className="font-serif font-bold" style={{ tracking: '0.2em' }}>NAVIGATION</span>
                        <button onClick={() => setIsMenuOpen(false)}><i data-lucide="x" className="w-5 h-5"></i></button>
                      </div>
                      <div className="flex flex-col space-y-4">
                        <button onClick={() => navigateTo("home")} className={`text-left text-xs uppercase font-bold py-2 ${currentPage === "home" && !selectedProduct ? "text-[#806B5F]" : "text-black"}`} style={{ tracking: '0.1em' }}>Home</button>
                        <button onClick={() => navigateTo("home")} className="text-left text-xs uppercase font-bold py-2 text-neutral-400 pl-4 border-l border-neutral-200" style={{ tracking: '0.1em' }}>— Shop Lineup</button>
                        <button onClick={() => navigateTo("about")} className={`text-left text-xs uppercase font-bold py-2 ${currentPage === "about" ? "text-[#806B5F]" : "text-black"}`} style={{ tracking: '0.1em' }}>Our Story</button>
                        <button onClick={() => navigateTo("contact")} className={`text-left text-xs uppercase font-bold py-2 ${currentPage === "contact" ? "text-[#806B5F]" : "text-black"}`} style={{ tracking: '0.1em' }}>Find Our Store</button>
                      </div>
                    </div>
                    <div className="text-[9px] text-neutral-400 uppercase" style={{ tracking: '0.2em' }}>JAYDRIZ APP V2.0</div>
                  </div>
                </div>
              )}

              {isCartOpen && (
                <div className="fixed inset-0 bg-black bg-opacity-50 z-50 flex justify-end" onClick={() => setIsCartOpen(false)}>
                  <div className="w-full max-w-md bg-white h-full p-6 flex flex-col justify-between shadow-2xl text-black" onClick={(e) => e.stopPropagation()}>
                    <div>
                      <div className="flex justify-between items-center mb-6 pb-4 border-b border-neutral-200">
                        <div className="flex items-center space-x-2">
                          <i data-lucide="shopping-cart" className="w-4 h-4 text-[#806B5F]"></i>
                          <span className="font-bold text-xs uppercase" style={{ tracking: '0.1em' }}>Your Shopping Cart ({totalItemsCount})</span>
                        </div>
                        <button onClick={() => setIsCartOpen(false)}><i data-lucide="x" className="w-5 h-5"></i></button>
                      </div>

                      {cart.length === 0 ? (
                        <div className="text-center py-20 text-neutral-400 space-y-4">
                          <i data-lucide="package-open" className="w-12 h-12 mx-auto stroke-1"></i>
                          <p className="text-xs uppercase font-semibold" style={{ tracking: '0.1em' }}>Your cart is empty</p>
                          <button onClick={() => { setIsCartOpen(false); navigateTo("home"); }} className="text-[10px] uppercase bg-black text-white px-4 py-2 font-bold" style={{ tracking: '0.2em' }}>Shop Now</button>
                        </div>
                      ) : (
                        <div className="space-y-4 overflow-y-auto max-h-[60vh] pr-1 no-scrollbar">
                          {cart.map((item, idx) => (
                            <div key={idx} className="flex items-center space-x-4 p-3 bg-neutral-50 rounded-sm border border-neutral-100">
                              <img src={item.product.image} className="w-12 h-12 object-cover bg-white border" />
                              <div className="flex-1 min-w-0">
                                <h4 className="text-xs font-bold truncate uppercase text-black">{item.product.name}</h4>
                                <p className="text-[10px] text-neutral-500 mt-0.5">
                                  Qty: {item.quantity} • {item.shade ? `Shade: ${SHADE_NAMES[item.shade] || item.shade}` : 'Standard'}
                                </p>
                                <span className="text-xs font-bold text-[#806B5F] block mt-1">₦{(item.product.price * item.quantity).toLocaleString()}</span>
                              </div>
                              <button onClick={() => handleRemoveFromCart(idx)} className="text-neutral-400 hover:text-red-500 p-1">
                                <i data-lucide="trash-2" className="w-4 h-4"></i>
                              </button>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>

                    {cart.length > 0 && (
                      <div className="border-t border-neutral-200 pt-4 space-y-4 bg-white">
                        <div className="flex justify-between items-center">
                          <span className="text-xs font-bold uppercase text-neutral-500" style={{ tracking: '0.1em' }}>Cart Total Price:</span>
                          <span className="text-lg font-black text-black">₦{totalCartPrice.toLocaleString()}</span>
                        </div>
                        <button onClick={handleCheckout} className="w-full bg-black text-white text-[10px] font-bold uppercase py-4 hover:bg-neutral-800 flex items-center justify-center space-x-2 shadow-lg" style={{ tracking: '0.2em' }}>
                          <span>Proceed to WhatsApp Checkout</span>
                          <i data-lucide="arrow-right" className="w-3.5 h-3.5"></i>
                        </button>
                      </div>
                    )}
                  </div>
                </div>
              )}

              {selectedProduct ? (
                <ProductDetail 
                  product={selectedProduct} 
                  onBack={() => setSelectedProduct(null)} 
                  onAddToCart={handleAddToCart} 
                  onDirectWhatsAppCheckout={handleDirectWhatsAppCheckout}
                />
              ) : (
                <>
                  {currentPage === "home" && (
                    <>
                      <HeroSection onShopNowClick={() => {
                        const el = document.getElementById("shop-layout-target");
                        if (el) el.scrollIntoView({ behavior: 'smooth' });
                      }} />
                      <div id="shop-layout-target">
                        <Shop onSelectProduct={setSelectedProduct} searchQuery={searchQuery} onClearSearch={() => setSearchQuery("")} />
                      </div>
                      <InstagramSection />
                    </>
                  )}
                  {currentPage === "about" && <AboutPage />}
                  {currentPage === "contact" && <ContactPage />}
                </>
              )}
            </div>

            <footer className="bg-black text-white py-12 px-6 mt-16 text-center text-[10px] uppercase border-t border-neutral-900" style={{ tracking: '0.1em' }}>
              <div className="max-w-4xl mx-auto mb-4">
                <p className="text-yellow-400 font-bold mb-2">WhatsApp Support: +234 803 539 9521</p>
                <p className="text-neutral-400 normal-case tracking-normal">Shop B012, Rivers Plaza II, Lagos Trade Fair Plaza, Off Lagos - Badagry Expressway, Lagos, Nigeria.</p>
              </div>
              <p className="text-neutral-500">© 2026 JAYDRIZ COSMETICS. All Luxury Rights Reserved.</p>
            </footer>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
