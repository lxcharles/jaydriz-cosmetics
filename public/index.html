    <meta charset="utf-8" />

    <meta name="theme-color" content="#FAF7F5" />
    <title>JAYDRIZ COSMETICS | Luxury Artistry</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Montserrat', 'sans-serif'],
              display: ['Montserrat', 'sans-serif'],
              serif: ['Playfair Display', 'serif']
            }
          }
        }
      }
    </script>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
  </head>
  <body class="bg-[#FAF7F5] text-black font-sans antialiased">
    <noscript>You need to enable JavaScript to run this app.</noscript>
    
    <div id="root"></div>

    <script type="text/babel" data-presets="react">
      const { useState, useEffect, useRef } = React;

      // 1. DATA CONSTANTS
      const PRODUCTS = [
        {
          id: "f1",
          name: "Foundation",
          category: "Face",
          price: 7500,
          image: "https://res.cloudinary.com/dehvk3bre/image/upload/v1780414858/Foundation_1_jefqeq.png",

          shades: ["#FEE1C3", "#FEBD85", "#FFC291", "#EC9759", "#C57D57", "#B1705C", "#C07756", "#77473B", "#5F3E37", "#3E2E2E"]
        },
        {
          id: "f2",

          price: 4500,
          image: "https://res.cloudinary.com/dehvk3bre/image/upload/v1780414852/Concealer_1_h7ftxw.png",

        },
        {

          description: "The ultimate secret to a shine-free, velvet-smooth complexion. Sets your base perfectly, blurring pores and controlling oil without looking heavy.",
          shades: ["#FEE1C3", "#FEBD85", "#FFC291", "#EC9759", "#C57D57", "#B1705C", "#C07756", "#77473B", "#5F3E37", "#3E2E2E"]
        },
        {
          id: "f4",
          name: "Powder Palette 12-in-1",
          category: "Face",
          price: 14000,
          image: "https://res.cloudinary.com/dehvk3bre/image/upload/v1780414858/Powder_A1_dxvgp3.png",
          description: "The definitive professional toolkit. Featuring 12 expertly curated powder shades, this palette provides versatility for highlighting, contouring, and setting across a vast spectrum."
        },
        {
          id: "f5",
          name: "Powder Palette 9-in-1",
          category: "Face",
          price: 11500,

        },
        {
          id: "a1",
          name: "Pigment",
          category: "Eyes",
          price: 2500,
          image: "https://res.cloudinary.com/dehvk3bre/image/upload/v1780422839/file_000000000d8471f5a60a806d29b341fc_pql4ml.png",
          description: "Turn up the intensity with ultra-concentrated loose pigment. Delivers high-impact, multidimensional shimmer that commands attention."
        },
        {
          id: "a2",
          name: "Chrome Pigment",

          price: 3000,
          image: "https://res.cloudinary.com/dehvk3bre/image/upload/v1780414851/Glitter_1_txkblx.png",
          description: "Experience liquid-metal luxury. Formulated for a dynamic, futuristic mirror-like shine that shifts with every angle of light."
        },
        {
          id: "a3",
          name: "Glitters",
          category: "Eyes",
          price: 1500,
          image: "https://res.cloudinary.com/dehvk3bre/image/upload/v1780424057/file_0000000016b471f583376336d93de28f_jbxqol.png",

        },
        {

          name: "Glitters Glue",
          category: "Eyes",
          price: 2000,
          image: "https://res.cloudinary.com/dehvk3bre/image/upload/v1780422835/file_00000000df2c71f58ef98fa2e27dc0c4_eviumc.png",

        },
        {
          id: "a5",
          name: "Pigment/Glitter Primer",
          category: "Eyes",
          price: 4500,
          image: "https://res.cloudinary.com/dehvk3bre/image/upload/v1780414854/Primer_1_inyqaw.png",
          description: "The ideal tacky, smoothing canvas that grips makeup tightly, ensuring extreme structural longevity and shade vibrance."
        },
        {
          id: "e1",
          name: "Beauty Blender 2in1",
          category: "Artistry",
          price: 1500,
          image: "https://res.cloudinary.com/dehvk3bre/image/upload/v1780424058/file_0000000060e871f5bc36060818abe5dc_wryxgo.png",
          description: "Achieve an airbrushed, custom editorial finish. High-density latex-free sponge optimized for both broad strokes and focused contours."
        },
        {
          id: "e2",
          name: "Single Blender+Puff",
          category: "Artistry",
          price: 2000,
          image: "https://res.cloudinary.com/dehvk3bre/image/upload/v1780414854/Sponge_1_vjh19n.png",
          description: "The perfect pro combo. The plush blender offers fluid, dewy applications, while the soft puff presses powder seamlessly."
        },
        {
          id: "e3",
          name: "Skin Prep Brush",
          category: "Artistry",
          price: 3000,
          image: "https://res.cloudinary.com/dehvk3bre/image/upload/v1780414856/Brush_1_s8qoql.png",
          description: "Engineered with ultra-soft synthetic bristles to feather skincare, primer, and creams into a silky pristine canvas."
        }
      ];

      const SHADE_NAMES = {
        "#FEE1C3": "Blonde",
        "#FEBD85": "Snowy",
        "#FFC291": "Sunshine",
        "#EC9759": "Clove",
        "#C57D57": "Spice",
        "#B1705C": "Amber",
        "#C07756": "Chocolate",
        "#77473B": "Java",
        "#5F3E37": "Expresso",
        "#3E2E2E": "Mahogany"
      };

      const HERO_SLIDES = [
        {
          image: "https://res.cloudinary.com/dehvk3bre/image/upload/v1780415231/20260331_085939_0000_npvhz9.png",
          title: "JAYDRIZ\nCOSMETICS",
          subtitle: "Affordable Luxury"
        },
        {
          image: "https://res.cloudinary.com/dehvk3bre/image/upload/v1780414851/Face_octrtg.png",
          title: "FLAWLESS FACE",
          subtitle: "All-day coverage, seamless foundations, and breathable powders engineered for ultimate perfection."
        },
        {
          image: "https://res.cloudinary.com/dehvk3bre/image/upload/v1780414852/Acce_qsf8tn.png",
          title: "PRO ARTISTRY",
          subtitle: "High-performance formulas and precise cosmetic tools designed for pure artistic expression."
        },
        {
          image: "https://res.cloudinary.com/dehvk3bre/image/upload/v1780414852/Eyes_iizg4c.png",
          title: "CAPTIVATING EYES",
          subtitle: "High-shimmer glitters, ultra-concentrated loose pigments, and lock-in primers designed for long-wear brilliance."
        }
      ];

      const INSTAGRAM_POSTS = [
        { id: "ig-1", handle: "@beauty_by_chioma", image: "https://images.unsplash.com/photo-1596462502278-27bfdc403348?w=600&auto=format&fit=crop&q=80", likes: "2,423", caption: "Flawless pigments that blend perfectly 💄" },
        { id: "ig-2", handle: "@glam_with_funmi", image: "https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9?w=600&auto=format&fit=crop&q=80", likes: "1,894", caption: "The ultimate long-wear formula! #JaydrizCosmetics" },
        { id: "ig-3", handle: "@lola_studios", image: "https://images.unsplash.com/photo-1620916566398-39f1143ab7be?w=600&auto=format&fit=crop&q=80", likes: "3,110", caption: "Shining bright today with custom lip formulas ✨" },
        { id: "ig-4", handle: "@pro_makeup_ng", image: "https://images.unsplash.com/photo-1512496015851-a90fb38ba796?w=600&auto=format&fit=crop&q=80", likes: "4,602", caption: "Absolute bridal perfection using JAYDRIZ Compact Powder." },
        { id: "ig-5", handle: "@bellanaija_beauty", image: "https://images.unsplash.com/photo-1515688594390-b649af70d282?w=600&auto=format&fit=crop&q=80", likes: "5,823", caption: "Spotted: JAYDRIZ backstage elegance on the runway." },
        { id: "ig-6", handle: "@temi_glam", image: "https://images.unsplash.com/photo-1487412720507-e7ab37603c6f?w=600&auto=format&fit=crop&q=80", likes: "1,248", caption: "Never leaving the house without these pigments!" }
      ];

      // 2. BACKWARD INTERFACE IMPLEMENTATIONS
      function HeroSection({ onShopNowClick }) {
        const [currentSlide, setCurrentSlide] = useState(0);

        useEffect(() => {
          const interval = setInterval(() => {
            setCurrentSlide((prev) => (prev + 1) % HERO_SLIDES.length);
          }, 6000);
          return () => clearInterval(interval);
        }, []);

        const slide = HERO_SLIDES[currentSlide];

        return (
          <section className="relative h-[85vh] flex items-center justify-center overflow-hidden bg-black text-white">
            <div className="absolute inset-0 z-0 opacity-75">
              <img src={slide.image} className="w-full h-full object-cover object-center transition-all duration-1000" alt="Hero" />
              <div className="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-black/30"></div>
            </div>
            <div className="relative z-10 text-center max-w-4xl px-6 flex flex-col items-center">
              <span className="text-xs uppercase tracking-[0.4em] text-amber-500 font-bold mb-3 block">Welcome to Jaydriz</span>
              <h1 className="font-serif text-4xl sm:text-6xl tracking-[0.15em] uppercase leading-tight mb-4 text-white drop-shadow-md style={{ whiteSpace: 'pre-line' }}">
                {slide.title}
              </h1>
              <p className="font-serif italic text-sm sm:text-base text-amber-100/90 max-w-xl tracking-wide mb-8 leading-relaxed">
                {slide.subtitle}
              </p>
              <button onClick={onShopNowClick} className="bg-white text-black text-[10px] tracking-[0.3em] font-bold py-4 px-10 hover:bg-transparent hover:text-white border border-white transition-all duration-300 uppercase shadow-xl">
                Shop Now &rarr;
              </button>
            </div>
            <div className="absolute bottom-8 left-12 hidden md:flex flex-col opacity-50">
              <span className="text-[9px] tracking-widest uppercase">Lagos, NG</span>
              <span className="w-12 h-[1px] bg-white mt-1"></span>
            </div>
          </section>
        );
      }

      function Shop({ onSelectProduct, searchQuery, onClearSearch }) {
        const [activeCategory, setActiveCategory] = useState("All");
        const carouselRef = useRef(null);

        const filtered = PRODUCTS.filter((p) => {
          const matchesCategory = activeCategory === "All" || p.category === activeCategory;
          const matchesQuery = !searchQuery || p.name.toLowerCase().includes(searchQuery.toLowerCase()) || p.description.toLowerCase().includes(searchQuery.toLowerCase());
          return matchesCategory && matchesQuery;
        });

        return (
          <section className="py-16 px-6 max-w-7xl mx-auto">
            <div className="text-center mb-12">
              <span className="text-xs uppercase tracking-[0.3em] text-[#806B5F] font-bold">The Collection</span>
              <h2 className="text-2xl sm:text-3xl text-black font-extrabold tracking-[0.15em] uppercase mt-2 mb-3">SHOP PRODUCTS</h2>
              <div className="w-16 h-[2px] bg-[#806B5F]/30 mx-auto"></div>
            </div>

            {searchQuery && (
              <div className="text-center mb-8 bg-white border border-neutral-200 p-4 max-w-md mx-auto flex items-center justify-between shadow-xs">
                <span className="text-xs text-neutral-600">Results for <strong className="text-black italic">"{searchQuery}"</strong> ({filtered.length})</span>
                <button onClick={onClearSearch} className="text-[10px] tracking-wider uppercase font-bold text-[#806B5F] bg-neutral-100 px-3 py-1">Clear</button>
              </div>
            )}

            <div className="flex justify-center space-x-3 mb-12 overflow-x-auto no-scrollbar py-2">
              {["All", "Face", "Eyes", "Artistry"].map((cat) => (
                <button key={cat} onClick={() => setActiveCategory(cat)} className={`px-6 py-2.5 text-[10px] tracking-widest font-bold uppercase transition-all rounded-sm ${activeCategory === cat ? "bg-black text-white" : "bg-white text-gray-500 border border-neutral-200"}`}>
                  {cat}
                </button>
              ))}
            </div>

            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
              {filtered.map((prod) => (
                <div key={prod.id} onClick={() => onSelectProduct(prod)} className="group cursor-pointer bg-white overflow-hidden flex flex-col justify-between border border-neutral-100 rounded-sm hover:shadow-xl transition-all duration-300">
                  <div className="relative aspect-[4/5] bg-neutral-100 overflow-hidden">
                    <img src={prod.image} alt={prod.name} className="w-full h-full object-cover object-center transition-transform duration-500 group-hover:scale-105" />
                    <div className="absolute inset-x-4 bottom-4 flex justify-center opacity-0 group-hover:opacity-100 transition-all duration-300">
                      <button className="w-full bg-black text-white text-[9px] font-bold uppercase tracking-widest py-2.5 shadow-lg">Quick View</button>
                    </div>
                  </div>
                  <div className="p-4 flex flex-col flex-grow justify-between">
                    <div>
                      <span className="text-[9px] uppercase tracking-widest text-[#806B5F] font-bold">{prod.category}</span>
                      <h3 className="text-xs sm:text-sm text-black font-semibold uppercase tracking-wider mt-0.5 truncate">{prod.name}</h3>
                    </div>
                    <div className="flex items-center justify-between mt-4 border-t border-neutral-100 pt-2.5">
                      <span className="text-xs sm:text-sm font-semibold text-[#806B5F]">₦{prod.price.toLocaleString()}</span>
                      {prod.shades && <span className="text-[9px] text-gray-400 bg-neutral-50 border px-1.5 py-0.5">{prod.shades.length} Shades</span>}
                    </div>
                  </div>
                </div>
              ))}
            </div>

            {/* Instagram Section Grid Container */}
            <div className="mt-24 border-t border-neutral-200 pt-16">
              <div className="text-center mb-10">
                <span className="text-xs uppercase tracking-[0.3em] text-[#806B5F] font-bold">Follow Our Journey</span>
                <h2 className="text-xl sm:text-2xl text-black font-bold tracking-[0.15em] uppercase mt-1">AS SEEN ON INSTAGRAM</h2>
              </div>
              <div ref={carouselRef} className="flex gap-4 overflow-x-auto no-scrollbar pb-4 snap-x">
                {INSTAGRAM_POSTS.map((post) => (
                  <div key={post.id} className="min-w-[260px] snap-start bg-white border border-neutral-100 rounded-sm overflow-hidden shadow-2xs">
                    <div className="aspect-square relative overflow-hidden">
                      <img src={post.image} className="w-full h-full object-cover" alt="Instagram" />
                    </div>
                    <div className="p-3 bg-white flex items-center justify-between border-t border-neutral-50 text-[10px]">
                      <span className="font-bold text-neutral-800">{post.handle}</span>
                      <a href="https://www.instagram.com/jaydrizcosmetics?igsh=eXJheHh0dGJmYnhr" target="_blank" rel="noopener noreferrer" className="text-[#806B5F] font-semibold underline">View Post</a>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </section>
        );
      }

      function ProductDetail({ product, onBack }) {
        const [selectedShade, setSelectedShade] = useState(product.shades ? product.shades[0] : null);
        const [quantity, setQuantity] = useState(1);
        const businessNumber = "2348035399521";

        const handleOrderViaWhatsApp = () => {
          const formattedPrice = `₦${(product.price * quantity).toLocaleString()}`;
          const shadeText = selectedShade ? `\n*Selected Shade:* ${SHADE_NAMES[selectedShade] || selectedShade}` : "";
          const message = `🛍️ JAYDRIZ COSMETICS ORDER%0A%0A*Product:* ${product.name}${shadeText}%0A*Quantity:* ${quantity}%0A*Total Order Price:* ${formattedPrice}%0A%0AKindly process my order, provide bank details, and share payment confirmation. Thank you!`;
          window.open(`https://wa.me/${businessNumber}?text=${message}`, "_blank");
        };

        return (
          <section className="py-12 px-6 max-w-5xl mx-auto bg-white border border-neutral-150 my-8 rounded-sm shadow-xs">
            <button onClick={onBack} className="text-[10px] font-bold uppercase tracking-widest text-neutral-400 hover:text-black mb-8 block">&larr; Back to Shop</button>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-12">
              <div className="aspect-[4/5] bg-neutral-50 border border-neutral-100 rounded-xs overflow-hidden">
                <img src={product.image} alt={product.name} className="w-full h-full object-cover" />
              </div>
              <div className="flex flex-col space-y-6">
                <div>
                  <span className="text-[10px] uppercase tracking-widest font-bold text-[#806B5F]">{product.category}</span>
                  <h1 className="text-2xl font-bold uppercase tracking-wider text-black mt-1 mb-2">{product.name}</h1>
                  <span className="text-xl font-bold text-[#806B5F]">₦{product.price.toLocaleString()}</span>
                </div>
                <div className="border-t border-neutral-100 pt-4">
                  <h3 className="text-[10px] uppercase tracking-widest font-bold text-neutral-400 mb-2">Product Description</h3>
                  <p className="text-xs sm:text-sm text-neutral-600 leading-relaxed">{product.description}</p>
                </div>

                {product.shades && (
                  <div className="space-y-3">
                    <h3 className="text-[10px] uppercase tracking-widest font-bold text-neutral-400">Selected Shade: <strong className="text-black font-bold">{SHADE_NAMES[selectedShade] || selectedShade}</strong></h3>
                    <div className="flex flex-wrap gap-2.5">
                      {product.shades.map((shade) => (
                        <button key={shade} onClick={() => setSelectedShade(shade)} className={`w-9 h-9 rounded-full border transition-all ${selectedShade === shade ? "ring-2 ring-[#806B5F] scale-110" : "border-neutral-300"}`} style={{ backgroundColor: shade }} />
                      ))}
                    </div>
                  </div>
                )}

                <div className="space-y-2">
                  <h3 className="text-[10px] uppercase tracking-widest font-bold text-neutral-400">Configure Quantity</h3>
                  <div className="flex items-center w-28 border border-neutral-300">
                    <button onClick={() => quantity > 1 && setQuantity(quantity - 1)} className="px-3 py-1.5 font-bold text-neutral-500 hover:text-black">-</button>
                    <span className="flex-1 text-center text-xs font-bold">{quantity}</span>
                    <button onClick={() => setQuantity(quantity + 1)} className="px-3 py-1.5 font-bold text-neutral-500 hover:text-black">+</button>
                  </div>
                </div>

                <button onClick={handleOrderViaWhatsApp} className="w-full bg-black text-white text-[10px] font-bold uppercase tracking-widest py-4 hover:bg-neutral-800 shadow-md">
                  Order via WhatsApp &bull; ₦{(product.price * quantity).toLocaleString()}
                </button>
              </div>
            </div>
          </section>
        );
      }

      function App() {
        const [loading, setLoading] = useState(true);
        const [selectedProduct, setSelectedProduct] = useState(null);
        const [searchQuery, setSearchQuery] = useState("");

        useEffect(() => {
          const timer = setTimeout(() => setLoading(false), 800);
          return () => clearTimeout(timer);
        }, []);

        if (loading) {
          return (
            <div className="fixed inset-0 bg-white z-[9999] flex flex-col items-center justify-center">
              <img src="https://res.cloudinary.com/dehvk3bre/image/upload/v1780414377/20260409_010010_u4nssj.png" className="w-24 h-24 object-contain mb-4 animate-pulse" alt="Logo" />
              <p className="text-[9px] text-neutral-600 font-bold tracking-[0.4em] uppercase">Luxury Artistry Loading...</p>
            </div>
          );
        }

        return (
          <div className="min-h-screen bg-[#FAF7F5] flex flex-col justify-between">
            <div>
              <header className="sticky top-0 bg-[#FAF7F5]/90 backdrop-blur-md border-b border-neutral-200/50 z-40 px-6 py-4 flex justify-between items-center">
                <span onClick={() => setSelectedProduct(null)} className="font-serif text-xl font-extrabold tracking-widest cursor-pointer">JAYDRIZ</span>
                <div className="flex items-center space-x-4">
                  <input type="text" placeholder="Search..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="border border-neutral-300 rounded-sm text-xs px-3 py-1.5 bg-white focus:outline-none max-w-[140px]" />
                  <span className="text-[10px] uppercase tracking-widest font-bold text-neutral-500 hidden sm:inline">Luxury Artistry</span>
                </div>
              </header>

              {!selectedProduct ? (
                <>
                  <HeroSection onShopNowClick={() => {
                    const el = document.getElementById("shop-layout-target");
                    if (el) el.scrollIntoView({ behavior: 'smooth' });
                  }} />
                  <div id="shop-layout-target">
                    <Shop onSelectProduct={setSelectedProduct} searchQuery={searchQuery} onClearSearch={() => setSearchQuery("")} />
                  </div>
                </>
              ) : (
                <ProductDetail product={selectedProduct} onBack={() => setSelectedProduct(null)} />
              )}
            </div>

            <footer className="bg-black text-white py-12 px-6 mt-16 text-center text-[10px] tracking-widest uppercase border-t border-neutral-900">
              <div className="max-w-4xl mx-auto mb-4">
                <p className="text-amber-400 font-bold mb-2">WhatsApp Support: +234 803 539 9521</p>
                <p className="text-neutral-400 normal-case tracking-normal">Shop B012, Rivers Plaza II, Lagos Trade Fair Plaza, Off Lagos - Badagry Expressway, Lagos, Nigeria.</p>
              </div>
              <p className="text-neutral-500">&copy; 2026 JAYDRIZ COSMETICS. All Luxury Rights Reserved.</p>
            </footer>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
