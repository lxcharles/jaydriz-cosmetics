          { id: "r2", name: "Temitope A.", rating: 4, comment: "This is a game changer. Super lightweight, long-lasting, and remarkably affordable for such professional-grade quality.", date: "1 week ago" },
          { id: "r3", name: "Fatima Y.", rating: 4, comment: "Smooth application and excellent pigment payoff. The blendability is pure luxury.", date: "2 weeks ago" }
        ];

        setReviews([
          { id: "r1", name: "Chiamaka O.", rating: 4, comment: "Absolutely in love with this! The quality is premium and matches my undertone flawlessly. Perfect for everyday wear.", date: "2 days ago" },
          { id: "r2", name: "Temitope A.", rating: 4, comment: "This is a game changer. Super lightweight, long-lasting, and remarkably affordable for such professional-grade quality.", date: "1 week ago" },
          { id: "r3", name: "Fatima Y.", rating: 4, comment: "Smooth application and excellent pigment payoff. The blendability is pure luxury.", date: "2 weeks ago" }
        ]);

        setSelectedShades((prev) => {

          if (window.scrollY > 400) { setShowScrollTop(true); } 
          else { setShowScrollTop(false); }
        };

        window.addEventListener("scroll", handleScroll);
        return () => {
          clearTimeout(timer);
          window.removeEventListener("scroll", handleScroll);
        };
      }, []);

      const handleAddToCart = (product, selectedShades, quantity) => {
        setCart((prevCart) => {
          const existingIdx = prevCart.findIndex((item) => {
            if (item.product.id !== product.id) return false;
            if (item.selectedShades.length !== selectedShades.length) return false;
            return item.selectedShades.every((s) => selectedShades.includes(s));
          });

          if (existingIdx > -1) {
            const updated = [...prevCart];
            updated[existingIdx].quantity += quantity;
            return updated;
          } else {
            return [...prevCart, { product, selectedShades, quantity }];
          }
        });
        setIsCartOpen(true);
      };

      const handleUpdateCartQty = (idx, isPlus) => {
        setCart((prevCart) => {
          const updated = [...prevCart];
          if (isPlus) { updated[idx].quantity += 1; } 
          else {
            if (updated[idx].quantity > 1) { updated[idx].quantity -= 1; } 
            else { updated.splice(idx, 1); }
          }
          return updated;
        });
      };

                                <p className="text-[10px] text-neutral-450 uppercase tracking-wider">{p.category}</p>
                              </div>
                              <span className="text-xs font-semibold text-[#806B5F] shrink-0">₦{p.price.toLocaleString("en-NG")}</span>
                            </div>
                          ))}
                          {matchingSearchProducts.length > 5 && (
                            <div className="text-center pt-2 border-t border-gray-100">
                              <button onClick={() => { handleSearchSubmit(); }} className="text-[10px] text-[#806B5F] hover:text-black font-bold tracking-widest uppercase py-1">View All Results</button>
                            </div>
                          )}
                        </div>
                      ) : (
                        <p className="text-xs text-neutral-400 italic py-4 text-center">No products match search.</p>
                      )}
                    </motion.div>
                  )}
                </AnimatePresence>
              </div>

              <button
                onClick={() => setIsCartOpen(true)}
                className="relative flex items-center justify-center p-2 text-black hover:text-[#806B5F] transition-colors focus:outline-none"
                id="open-cart-drawer-btn"
              >
                <ShoppingBag size={20} />
                {cart.length > 0 && (
                  <span className="absolute -top-1 -right-1 bg-black text-white font-mono font-bold text-[8px] h-4 w-4 rounded-full flex items-center justify-center animate-pulse">
                    {cart.reduce((a, b) => a + b.quantity, 0)}
                  </span>
                )}
              </button>
            </div>
          </header>

          <AnimatePresence>
            {isMobileMenuOpen && (
              <motion.div
                initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}
                onClick={() => setIsMobileMenuOpen(false)}
                className="fixed inset-0 z-40 bg-black/40 backdrop-blur-xs md:hidden"
              >
                <motion.div
                  initial={{ x: "-100%" }} animate={{ x: 0 }} exit={{ x: "-100%" }}
                  transition={{ type: "spring", damping: 25, stiffness: 200 }}
                  onClick={(e) => e.stopPropagation()}
                  className="w-4/5 max-w-[300px] h-full bg-white p-6 shadow-2xl flex flex-col justify-between"
                >
                  <div className="space-y-8">
                    <div className="flex items-center justify-between border-b border-neutral-100 pb-4">
                      <span className="font-display font-black text-xs tracking-widest text-black">JAYDRIZ MENU</span>
                      <button onClick={() => setIsMobileMenuOpen(false)} className="text-neutral-500 hover:text-black focus:outline-none p-1 flex items-center justify-center"><X size={18} /></button>
                    </div>

                    <div className="relative">
                      <div className="flex items-center bg-neutral-50 border border-neutral-200/60 rounded-sm px-3 py-2">
                        <Search size={16} className="text-neutral-400 mr-2 shrink-0 flex items-center justify-center" />
                        <input
                          type="text" placeholder="Search creations..." value={headerSearchValue}
                          onChange={(e) => setHeaderSearchValue(e.target.value)}
                          onKeyDown={(e) => { if (e.key === "Enter") { handleSearchSubmit(); } }}
                          className="bg-transparent text-xs text-black placeholder-neutral-450 focus:outline-none w-full"
                        />
                        {headerSearchValue && (
                          <button onClick={() => setHeaderSearchValue("")} className="text-xs text-neutral-500 hover:text-black ml-2 shrink-0" aria-label="Clear mobile search query">✕</button>
                        )}
                      </div>
                    </div>

                    <nav className="flex flex-col space-y-6">
                      <button onClick={() => { setCurrentView("home"); setSelectedProduct(null); setIsMobileMenuOpen(false); window.scrollTo({ top: 0, behavior: "smooth" }); }} className={`font-display text-[10px] tracking-widest font-bold uppercase text-left transition-colors hover:text-[#806B5F] ${currentView === "home" ? "text-black pl-2 border-l-2 border-black" : "text-gray-400"}`}>Home</button>
                      <button onClick={() => { setCurrentView("shop"); setSelectedProduct(null); setIsMobileMenuOpen(false); window.scrollTo({ top: 0, behavior: "smooth" }); }} className={`font-display text-[10px] tracking-widest font-bold uppercase text-left transition-colors hover:text-[#806B5F] ${currentView === "shop" ? "text-black pl-2 border-l-2 border-black" : "text-gray-400"}`}>Shop</button>
                      <button onClick={() => { setCurrentView("about"); setSelectedProduct(null); setIsMobileMenuOpen(false); window.scrollTo({ top: 0, behavior: "smooth" }); }} className={`font-display text-[10px] tracking-widest font-bold uppercase text-left transition-colors hover:text-[#806B5F] ${currentView === "about" ? "text-black pl-2 border-l-2 border-black" : "text-gray-400"}`}>About JAYDRIZ</button>
                      <button onClick={() => { setCurrentView("contact"); setSelectedProduct(null); setIsMobileMenuOpen(false); window.scrollTo({ top: 0, behavior: "smooth" }); }} className={`font-display text-[10px] tracking-widest font-bold uppercase text-left transition-colors hover:text-[#806B5F] ${currentView === "contact" ? "text-black pl-2 border-l-2 border-black" : "text-gray-400"}`}>Contact us</button>
                    </nav>
                  </div>

                  <div className="border-t border-neutral-100 pt-6 space-y-4">
                    <span className="text-[8px] uppercase tracking-widest text-[#806B5F] font-bold block">Exclusive luxury</span>
                    <p className="text-[10px] text-neutral-500 leading-relaxed font-light">Join us in redefining professional beauty and radiant artistry without compromise.</p>
                    <div className="flex items-center space-x-3 text-neutral-500 text-xs">
                      <Instagram size={14} />
                      <a href="https://www.instagram.com/jaydrizcosmetics?igsh=eXJheHh0dGJmYnhr" target="_blank" rel="noopener noreferrer" className="underline hover:text-black">@jaydrizcosmetics</a>
                    </div>
                  </div>
                </motion.div>
              </motion.div>
            )}
          </AnimatePresence>

          <main className="flex-grow">
            {currentView === "home" && (
              <div>
                <HeroSection onShopNowClick={() => { setCurrentView("shop"); window.scrollTo({ top: 0, behavior: "smooth" }); }} />
                <ShopComponent products={productsList} onSelectProduct={handleSelectProduct} searchQuery={searchQuery} onClearSearch={() => setSearchQuery("")} />
              </div>
            )}

            {currentView === "shop" && (
              <ShopComponent products={productsList} onSelectProduct={handleSelectProduct} searchQuery={searchQuery} onClearSearch={() => setSearchQuery("")} />
            )}

            {currentView === "about" && <AboutJaydriz />}
            {currentView === "contact" && <ContactJaydriz />}

            {currentView === "detail" && selectedProduct && (
              <ProductDetail product={selectedProduct} onBack={() => { setCurrentView("shop"); setSelectedProduct(null); }} onAddToCart={handleAddToCart} />
            )}
          </main>

          {isCartOpen && (
            <div className="fixed inset-0 z-[100] flex justify-end">
              <div onClick={() => setIsCartOpen(false)} className="absolute inset-0 bg-black/60 backdrop-blur-xs transition-opacity duration-300"></div>
              <div className="relative w-full max-w-md h-full bg-white shadow-2xl flex flex-col justify-between z-10 animate-slide-in">
                <div className="p-6 border-b border-neutral-100 flex items-center justify-between">
                  <div className="flex items-center space-x-3">
                    <ShoppingBag size={18} className="text-[#806B5F]" />
                    <h2 className="font-display text-xs tracking-[0.2em] font-extrabold uppercase text-black">My Shopping Bag</h2>
                  </div>
                  <button onClick={() => setIsCartOpen(false)} className="p-1 hover:bg-neutral-100 rounded-full transition-colors text-gray-500 hover:text-black flex items-center justify-center"><X size={18} /></button>
                </div>

                <div className="flex-grow overflow-y-auto p-6 space-y-6">
                  {cart.length === 0 ? (
                    <div className="h-full flex flex-col items-center justify-center text-center space-y-4 font-sans">
                      <div className="w-12 h-12 rounded-full bg-neutral-50 flex items-center justify-center text-gray-300"><ShoppingBag size={20} /></div>
                      <div>
                        <h3 className="font-display text-[10px] tracking-widest font-bold uppercase text-black">Your bag is empty</h3>
                        <p className="text-[11px] text-gray-400 mt-1 max-w-xs">Curate beauty items from our premium cosmetics collections to fill your checkout bag.</p>
                      </div>
                    </div>
                  ) : (
                    cart.map((item, idx) => (
                      <div key={`${item.product.id}-${item.selectedShades.join(",")}`} className="flex space-x-4 border-b border-neutral-50 pb-6 font-sans">
                        <div className="w-20 h-24 bg-neutral-100 overflow-hidden shrink-0 border border-neutral-100 rounded-xs">
                          <img src={item.product.image} alt={item.product.name} className="w-full h-full object-cover" />
                        </div>
                        <div className="flex-grow flex flex-col justify-between">
                          <div>
                            <div className="flex justify-between">
                              <h4 className="text-xs uppercase font-extrabold text-black font-display tracking-wider">{item.product.name}</h4>
                            </div>
                            {item.selectedShades && item.selectedShades.length > 0 && (
                              <div className="mt-2 space-y-1">
                                <span className="text-[8px] text-gray-400 uppercase tracking-widest block">Shades:</span>
                                <div className="flex flex-wrap gap-1">
                                  {item.selectedShades.map((shade) => (
                                    <div key={shade} className="inline-flex items-center space-x-1.5 bg-neutral-50 border border-neutral-150 px-2 py-0.5 rounded-sm" title={SHADE_NAMES[shade] || shade}>
                                      <span className="w-2 h-2 rounded-full border border-neutral-200" style={{ backgroundColor: shade }}></span>
                                      <span className="text-[8.5px] font-bold font-mono text-gray-650">{(SHADE_NAMES[shade] || shade).split(" (")[0]}</span>
                                    </div>
                                  ))}
                                </div>
                              </div>
                            )}
                          </div>
                          <div className="flex items-center justify-between">
                            <div className="flex items-center border border-neutral-200 rounded-xs scale-90 origin-left">
                              <button onClick={() => handleUpdateCartQty(idx, false)} className="px-2.5 py-1 text-[10px] hover:bg-neutral-50">-</button>
                              <span className="px-3.5 py-1 text-[9px] font-bold font-mono">{item.quantity}</span>
                              <button onClick={() => handleUpdateCartQty(idx, true)} className="px-2.5 py-1 text-[10px] hover:bg-neutral-50">+</button>
                            </div>
                            <span className="text-xs font-semibold text-neutral-800">₦{(item.product.price * item.quantity).toLocaleString("en-NG")}</span>
                          </div>
                        </div>
                      </div>
                    ))
                  )}
                </div>

                {cart.length > 0 && (
                  <div className="p-6 border-t border-neutral-100 bg-[#FAF7F5] space-y-4">
                    <div className="flex items-center justify-between">
                      <span className="font-display text-[10px] tracking-wider uppercase text-neutral-500">Est. Subtotal</span>
                      <span className="text-base font-bold text-black font-mono">₦{calculateSubtotal().toLocaleString("en-NG")}</span>
                    </div>
                    <button onClick={handleCheckoutCartViaWhatsApp} className="w-full bg-[#1b4332]/95 hover:bg-[#1b4332] text-white py-4 text-[10px] tracking-[0.25em] font-display font-bold uppercase transition-colors duration-300 rounded-sm flex items-center justify-center space-x-2 shadow-md">
                      <ShoppingBag size={12} className="animate-pulse" />
                      <span>Order Bag via WhatsApp</span>
                    </button>
                  </div>
                )}
              </div>
            </div>
          )}

          <a
            href="https://wa.me/2348035399521?text=Hello%20JAYDRIZ%20COSMETICS,%20I'm%20writing%20to%20inquire%20about%20your%20professional%20beauty%20line%20and%20makeup%20products."
            target="_blank" rel="noopener noreferrer"
            className="fixed bottom-6 right-6 z-50 bg-[#25d366]/90 hover:bg-[#25d366] text-white p-4 rounded-full shadow-2xl hover:scale-110 active:scale-95 transition-all duration-300 flex items-center justify-center"
            aria-label="Contact JAYDRIZ on WhatsApp"
          >
            <MessageSquare size={24} />
          </a>

          <footer className="bg-black text-white pt-16 pb-12 border-t border-neutral-900 mt-auto font-sans">
            <div className="max-w-6xl mx-auto px-6 grid grid-cols-1 md:grid-cols-2 gap-12">
              <div className="space-y-4">
                <h2 className="font-display text-lg font-black tracking-[0.3em] text-white">JAYDRIZ COSMETICS</h2>
                <p className="text-[11px] text-white leading-relaxed max-w-sm">Jaydriz Cosmetics is a trailblazing beauty brand designed for the modern makeup enthusiast who refuses to compromise on quality or cost. Merging high-performance formulas with trend-driven innovation, the brand delivers an inclusive, pro-level beauty experience that empowers self-expression for every skin tone and type.</p>
              </div>
              <div className="space-y-4">
                <h3 className="font-display text-[10px] tracking-[0.3em] font-bold uppercase text-amber-500">Support & Inquiries</h3>
                <p className="text-[11px] text-white leading-relaxed">
                  WhatsApp Support:{" "}
                  <a href="https://wa.me/2348035399521" target="_blank" rel="noopener noreferrer" className="hover:text-amber-400 text-white font-bold underline font-mono">+234 803 539 9521</a>
                  <br />
                  <span className="text-white font-bold">Address:</span> Shop B012, Rivers Plaza II, Lagos Trade Fair Plaza, Off Lagos - Badagry Expressway, Lagos, Nigeria.
                  <br />
                  <span className="text-white font-bold">Hours:</span> Mon - Sat, 9 AM - 6 PM
                </p>
              </div>
            </div>
            <div className="max-w-6xl mx-auto px-6 border-t border-neutral-900 mt-12 pt-6 text-center">
              <p className="text-[9px] tracking-widest text-white uppercase">© 2026 JAYDRIZ COSMETICS. All Luxury Rights Reserved.</p>
            </div>
          </footer>

          {showScrollTop && (
            <button
              onClick={() => window.scrollTo({ top: 0, behavior: "smooth" })}
              className="fixed bottom-24 right-8 z-[49] bg-white text-black p-2 rounded-full shadow-md border border-neutral-100 hover:scale-105 active:scale-95 transition-all duration-300 flex items-center justify-center"
              aria-label="Scroll to top"
            >
              <ArrowUp size={16} />
            </button>
          )}
        </div>
      );
    }

    // Render the synchronized platform node
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
