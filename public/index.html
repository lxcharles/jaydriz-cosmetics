<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAYDRIZ COSMETICS | Luxury Artistry</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght=0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- STABLE PRODUCTION CDNS (Prevents the blank page issue) -->
    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone@7.22.20/babel.min.js" crossorigin></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Montserrat', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #FAF7F5;
            color: #000000;
            -webkit-font-smoothing: antialiased;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const PRODUCTS = [
            {
                id: "f1",
                name: "Foundation",
                category: "Face",
                price: 7500,
                image: "https://res.cloudinary.com/dehvk3bre/image/upload/v1780414858/Foundation_1_jefqeq.png",
                description: "Unlock a flawless, second-skin finish with a formula designed for high-performance wear. Offers custom buildable coverage that seamlessly erases imperfections while maintaining a natural, breathable glow.",
                shades: ["#FEE1C3", "#FEBD85", "#FFC291", "#EC9759", "#C57D57", "#B1705C", "#C07756", "#77473B", "#5F3E37", "#3E2E2E"]
            },
            {
                id: "f2",
                name: "Concealer",
                category: "Face",
                price: 4500,
                image: "https://res.cloudinary.com/dehvk3bre/image/upload/v1780414852/Concealer_1_h7ftxw.png",
                description: "Expertly hide what you want and highlight what you love. This creamy, high-coverage formula melts into the skin to brighten dark circles and vanish blemishes with a crease-resistant, natural finish.",
                shades: ["#FEE1C3", "#FEBD85", "#FFC291", "#EC9759", "#C57D57", "#B1705C", "#C07756", "#77473B", "#5F3E37", "#3E2E2E"]
            },
            {
                id: "f3",
                name: "Compact Powder",
                category: "Face",
                price: 7500,
                image: "https://res.cloudinary.com/dehvk3bre/image/upload/v1780414855/Compact_1_kbrllw.png",
                description: "The ultimate secret to a shine-free, velvet-smooth complexion. Sets your base perfectly, blurring pores and controlling oil without looking heavy.",
                shades: ["#FEE1C3", "#FEBD85", "#FFC291", "#EC9759", "#C57D57", "#B1705C", "#C07756", "#77473B", "#5F3E37", "#3E2E2E"]
            },
            {
                id: "f4",
                name: "Powder Palette 12-in-1",
                category: "Face",
                price: 14000,
                image: "https://res.cloudinary.com/dehvk3bre/image/upload/v1780414858/Powder_A1_dxvgp3.png",
                description: "The definitive professional toolkit. Featuring 12 expertly curated powder shades, this palette provides versatility for highlighting, contouring, and setting across a vast spectrum."
            },
            {
                id: "f5",
                name: "Powder Palette 9-in-1",
                category: "Face",
                price: 11500,
                image: "https://res.cloudinary.com/dehvk3bre/image/upload/v1780414855/Powder_B_aaubvp.png",
                description: "A sophisticated, streamlined collection of essential shades. Formulated for precision and blendability to create a sculpted finish."
            },
            {
                id: "a1",
                name: "Pigment",
                category: "Eyes",
                price: 2500,
                image: "https://res.cloudinary.com/dehvk3bre/image/upload/v1780422839/file_000000000d8471f5a60a806d29b341fc_pql4ml.png",
                description: "Turn up the intensity with ultra-concentrated loose pigment. Delivers high-impact, multidimensional shimmer that commands attention."
            },
            {
                id: "a2",
                name: "Chrome Pigment",
                category: "Eyes",
                price: 3500,
                image: "https://res.cloudinary.com/dehvk3bre/image/upload/v1780414851/Glitter_1_txkblx.png",
                description: "Experience liquid-metal luxury. Formulated for a dynamic, futuristic mirror-like shine that shifts with every angle of light."
            },
            {
                id: "a3",
                name: "Glitters",
                category: "Eyes",
                price: 1500,
                image: "https://res.cloudinary.com/dehvk3bre/image/upload/v1780424057/file_0000000016b471f583376336d93de28f_jbxqol.png",
                description: "Add a touch of pure magic to your application. Multi-reflective premium flakes providing dazzling, stellar dimension."
            },
            {
                id: "a4",
                name: "Glitters Glue",
                category: "Eyes",
                price: 2000,
                image: "https://res.cloudinary.com/dehvk3bre/image/upload/v1780422835/file_00000000df2c71f58ef98fa2e27dc0c4_eviumc.png",
                description: "The lightweight, invisible bond ensuring fine particles stay exactly where you apply them. Waterproof formula without stiff residue."
            },
            {
                id: "a5",
                name: "Pigment/Glitter Primer",
                category: "Eyes",
                price: 4500,
                image: "https://res.cloudinary.com/dehvk3bre/image/upload/v1780414854/Primer_1_inyqaw.png",
                description: "The ideal tacky, smoothing canvas that grips makeup tightly, ensuring extreme structural longevity and shade vibrance."
            },
            {
                id: "e1",
                name: "Beauty Blender 2in1",
                category: "Artistry",
                price: 1500,
                image: "https://res.cloudinary.com/dehvk3bre/image/upload/v1780424058/file_0000000060e871f5bc36060818abe5dc_wryxgo.png",
                description: "Achieve an airbrushed, custom editorial finish. High-density latex-free sponge optimized for both broad strokes and focused contours."
            },
            {
                id: "e2",
                name: "Single Blender+Puff",
                category: "Artistry",
                price: 2500,
                image: "https://res.cloudinary.com/dehvk3bre/image/upload/v1780414854/Sponge_1_vjh19n.png",
                description: "The perfect pro combo. The plush blender offers fluid, dewy applications, while the soft puff presses powder seamlessly."
            },
            {
                id: "e3",
                name: "Skin Prep Brush",
                category: "Artistry",
                price: 3000,
                image: "https://res.cloudinary.com/dehvk3bre/image/upload/v1780414856/Brush_1_s8qoql.png",
                description: "Engineered with ultra-soft synthetic bristles to feather skincare, primer, and creams into a silky pristine canvas."
            }
        ];

        const SHADE_NAMES = {
            "#FEE1C3": "Blonde", "#FEBD85": "Snowy", "#FFC291": "Sunshine",
            "#EC9759": "Clove", "#C57D57": "Spice", "#B1705C": "Amber",
            "#C07756": "Chocolate", "#77473B": "Java", "#5F3E37": "Expresso", "#3E2E2E": "Mahogany"
        };

        const HERO_SLIDES = [
            {
                image: "https://res.cloudinary.com/dehvk3bre/image/upload/v1780415231/20260331_085939_0000_npvhz9.png",
                title: "JAYDRIZ\nCOSMETICS",
                subtitle: "Affordable Luxury"
            },
            {
                image: "https://res.cloudinary.com/dehvk3bre/image/upload/v1780414851/Face_octrtg.png",
                title: "FLAWLESS FACE",
                subtitle: "All-day coverage, seamless foundations, and breathable powders engineered for ultimate perfection."
            }
        ];

        function App() {
            const [showSplash, setShowSplash] = useState(true);
            const [view, setView] = useState("home"); // home, about, contact, detail
            const [selectedProductId, setSelectedProductId] = useState(null);
            const [activeCategory, setActiveCategory] = useState("All");
            const [searchQuery, setSearchQuery] = useState("");
            const [cart, setCart] = useState([]);
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [heroIndex, setHeroIndex] = useState(0);

            // Detail Page States
            const [detailBaseQty, setDetailBaseQty] = useState(1);
            const [detailSelectedShades, setDetailSelectedShades] = useState({});

            useEffect(() => {
                const timer = setTimeout(() => setShowSplash(false), 2000);
                return () => clearTimeout(timer);
            }, []);

            useEffect(() => {
                if (view === "home" && !selectedProductId) {
                    const slideTimer = setInterval(() => {
                        setHeroIndex((prev) => (prev + 1) % HERO_SLIDES.length);
                    }, 5000);
                    return () => clearInterval(slideTimer);
                }
            }, [view, selectedProductId]);

            const selectedProduct = PRODUCTS.find(p => p.id === selectedProductId);

            const handleProductClick = (id) => {
                setSelectedProductId(id);
                setDetailBaseQty(1);
                setDetailSelectedShades({});
                setView("detail");
                window.scrollTo(0, 0);
            };

            const toggleShadeSelection = (shade) => {
                setDetailSelectedShades(prev => {
                    const updated = { ...prev };
                    if (updated[shade]) {
                        delete updated[shade];
                    } else {
                        updated[shade] = 1;
                    }
                    return updated;
                });
            };

            const updateShadeQty = (shade, delta) => {
                setDetailSelectedShades(prev => {
                    const updated = { ...prev };
                    if (!updated[shade]) return prev;
                    updated[shade] += delta;
                    if (updated[shade] <= 0) delete updated[shade];
                    return updated;
                });
            };

            const addToCart = () => {
                if (!selectedProduct) return;

                if (selectedProduct.shades) {
                    const entries = Object.entries(detailSelectedShades);
                    if (entries.length === 0) {
                        alert("Please select at least one shade variant.");
                        return;
                    }
                    setCart(prev => {
                        let updated = [...prev];
                        entries.forEach(([shade, qty]) => {
                            const matchIdx = updated.findIndex(item => item.product.id === selectedProduct.id && item.shade === shade);
                            if (matchIdx > -1) {
                                updated[matchIdx].quantity += qty;
                            } else {
                                updated.push({ product: selectedProduct, quantity: qty, shade });
                            }
                        });
                        return updated;
                    });
                } else {
                    setCart(prev => {
                        let updated = [...prev];
                        const matchIdx = updated.findIndex(item => item.product.id === selectedProduct.id && !item.shade);
                        if (matchIdx > -1) {
                            updated[matchIdx].quantity += detailBaseQty;
                        } else {
                            updated.push({ product: selectedProduct, quantity: detailBaseQty, shade: null });
                        }
                        return updated;
                    });
                }

                setDetailSelectedShades({});
                setDetailBaseQty(1);
                setIsCartOpen(true);
            };

            const removeFromCart = (idx) => {
                setCart(prev => prev.filter((_, i) => i !== idx));
            };

            const cartTotal = cart.reduce((sum, item) => sum + (item.product.price * item.quantity), 0);
            const cartCount = cart.reduce((sum, item) => sum + item.quantity, 0);

            const checkoutCart = () => {
                let message = `🛍️ JAYDRIZ COSMETICS - ORDER SUMMARY%0A%0A`;
                cart.forEach((item, index) => {
                    const shadeStr = item.shade ? ` (${SHADE_NAMES[item.shade] || item.shade})` : "";
                    message += `${index + 1}. *${item.product.name}*${shadeStr}%0A   Qty: ${item.quantity} x ₦${item.product.price.toLocaleString()} = ₦${(item.product.price * item.quantity).toLocaleString()}%0A%0A`;
                });
                message += `*Grand Total:* ₦${cartTotal.toLocaleString()}%0A%0APlease confirm availability for delivery.`;
                window.open(`https://wa.me/2348035399521?text=${message}`, "_blank");
            };

            const directCheckout = () => {
                if (!selectedProduct) return;
                let message = `🛍️ JAYDRIZ COSMETICS - DIRECT ORDER%0A%0A`;
                let total = 0;

                if (selectedProduct.shades) {
                    const entries = Object.entries(detailSelectedShades);
                    if (entries.length === 0) {
                        alert("Please select at least one shade variant.");
                        return;
                    }
                    entries.forEach(([shade, qty], index) => {
                        const cost = selectedProduct.price * qty;
                        total += cost;
                        message += `${index + 1}. *${selectedProduct.name}* (${SHADE_NAMES[shade] || shade})%0A   Qty: ${qty} x ₦${selectedProduct.price.toLocaleString()} = ₦${cost.toLocaleString()}%0A%0A`;
                    });
                } else {
                    total = selectedProduct.price * detailBaseQty;
                    message += `1. *${selectedProduct.name}*%0A   Qty: ${detailBaseQty} x ₦${selectedProduct.price.toLocaleString()} = ₦${total.toLocaleString()}%0A%0A`;
                }

                message += `*Total Price:* ₦${total.toLocaleString()}%0A%0AIs this available?`;
                window.open(`https://wa.me/2348035399521?text=${message}`, "_blank");
            };

            const filteredProducts = PRODUCTS.filter(p => {
                const matchesCat = activeCategory === "All" || p.category === activeCategory;
                const matchesSearch = !searchQuery || p.name.toLowerCase().includes(searchQuery.toLowerCase());
                return matchesCat && matchesSearch;
            });

            if (showSplash) {
                return (
                    <div class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center">
                        <img src="https://res.cloudinary.com/dehvk3bre/image/upload/v1780414377/20260409_010010_u4nssj.png" class="w-24 h-24 object-contain mb-4" alt="Logo" />
                        <p class="text-[9px] text-neutral-500 font-bold uppercase tracking-[0.4em]">Luxury Artistry...</p>
                    </div>
                );
            }

            return (
                <div class="min-h-screen bg-[#FAF7F5] flex flex-col justify-between relative overflow-x-hidden">
                    
                    {/* Header Layout */}
                    <header class="sticky top-0 bg-[#FAF7F5]/90 backdrop-blur-md border-b border-neutral-200 z-40 px-6 py-4 flex justify-between items-center">
                        <div class="flex items-center space-x-2">
                            <button onClick={() => setIsMenuOpen(true)} class="p-1 text-black">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                            </button>
                            <span onClick={() => { setView("home"); setSelectedProductId(null); }} class="font-serif text-lg font-extrabold cursor-pointer tracking-[0.2em]">JAYDRIZ</span>
                        </div>

                        <div class="flex items-center space-x-4">
                            <input 
                                type="text" 
                                value={searchQuery}
                                onChange={(e) => {
                                    setSearchQuery(e.target.value);
                                    if(view !== "home") { setView("home"); setSelectedProductId(null); }
                                }}
                                placeholder="Search..." 
                                class="border border-neutral-300 rounded-sm text-xs px-3 py-1.5 bg-white focus:outline-none max-w-[120px] sm:max-w-[160px]" 
                            />
                            <button onClick={() => setIsCartOpen(true)} class="relative p-1 text-black">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 0a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                                {cartCount > 0 && (
                                    <span class="absolute -top-1 -right-1 bg-black text-white font-bold text-[8px] w-4 h-4 rounded-full flex items-center justify-center shadow-sm">{cartCount}</span>
                                )}
                            </button>
                        </div>
                    </header>

                    {/* Sidebar Nav */}
                    {isMenuOpen && (
                        <div class="fixed inset-0 bg-black/40 z-50 flex">
                            <div class="w-64 bg-[#FAF7F5] h-full p-6 flex flex-col justify-between shadow-2xl animate-slide-in">
                                <div>
                                    <div class="flex justify-between items-center mb-8 pb-4 border-b border-neutral-200">
                                        <span class="font-bold text-xs tracking-[0.2em]">NAVIGATION</span>
                                        <button onClick={() => setIsMenuOpen(false)}>
                                            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path></svg>
                                        </button>
                                    </div>
                                    <div class="flex flex-col space-y-4">
                                        <button onClick={() => { setView("home"); setSelectedProductId(null); setIsMenuOpen(false); }} class="text-left text-xs uppercase font-bold py-2 tracking-[0.1em]">Home</button>
                                        <button onClick={() => { setView("about"); setIsMenuOpen(false); }} class="text-left text-xs uppercase font-bold py-2 tracking-[0.1em]">Our Story</button>
                                        <button onClick={() => { setView("contact"); setIsMenuOpen(false); }} class="text-left text-xs uppercase font-bold py-2 tracking-[0.1em]">Find Our Store</button>
                                    </div>
                                </div>
                            </div>
                            <div class="flex-1" onClick={() => setIsMenuOpen(false)}></div>
                        </div>
                    )}

                    {/* Cart Drawer */}
                    {isCartOpen && (
                        <div class="fixed inset-0 bg-black/50 z-50 flex justify-end">
                            <div class="w-full max-w-md bg-white h-full p-6 flex flex-col justify-between shadow-2xl">
                                <div>
                                    <div class="flex justify-between items-center mb-6 pb-4 border-b border-neutral-200">
                                        <span class="font-bold text-xs uppercase tracking-[0.1em]">Your Cart ({cartCount})</span>
                                        <button onClick={() => setIsCartOpen(false)}>
                                            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path></svg>
                                        </button>
                                    </div>
                                    <div class="space-y-4 overflow-y-auto max-h-[65vh] pr-1 no-scrollbar">
                                        {cart.length === 0 ? (
                                            <div class="text-center py-16 text-neutral-400 space-y-2">
                                                <p class="text-xs uppercase font-medium">Your cart is empty</p>
                                            </div>
                                        ) : (
                                            cart.map((item, idx) => (
                                                <div key={idx} class="flex items-center space-x-4 p-3 bg-neutral-50 rounded-sm border border-neutral-100">
                                                    <img src={item.product.image} class="w-12 h-12 object-cover bg-white border" />
                                                    <div class="flex-1 min-w-0">
                                                        <h4 class="text-xs font-bold truncate uppercase">{item.product.name}</h4>
                                                        <p class="text-[10px] text-neutral-500">Qty: {item.quantity} {item.shade ? `• ${SHADE_NAMES[item.shade] || item.shade}` : ''}</p>
                                                        <span class="text-xs font-bold text-[#806B5F]">₦{(item.product.price * item.quantity).toLocaleString()}</span>
                                                    </div>
                                                    <button onClick={() => removeFromCart(idx)} class="text-neutral-400 hover:text-red-500">
                                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-16v1M4 7h16"></path></svg>
                                                    </button>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </div>
                                {cart.length > 0 && (
                                    <div class="border-t border-neutral-200 pt-4 space-y-4">
                                        <div class="flex justify-between items-center">
                                            <span class="text-xs font-bold uppercase text-neutral-500 tracking-wider">Total:</span>
                                            <span class="text-lg font-black">₦{cartTotal.toLocaleString()}</span>
                                        </div>
                                        <button onClick={checkoutCart} class="w-full bg-black text-white text-[10px] font-bold uppercase py-4 tracking-[0.2em] flex items-center justify-center space-x-2">
                                            <span>Proceed to WhatsApp Checkout</span>
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* Dynamic View Engine */}
                    <main>
                        {view === "home" && (
                            <div>
                                {/* Hero Slider */}
                                <section class="relative h-[65vh] flex items-center justify-center overflow-hidden bg-black text-white">
                                    <div class="absolute inset-0 z-0 opacity-70">
                                        <img src={HERO_SLIDES[heroIndex].image} class="w-full h-full object-cover object-center transition-all duration-1000" alt="Hero" />
                                        <div class="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-black/20"></div>
                                    </div>
                                    <div class="relative z-10 text-center max-w-4xl px-6 flex flex-col items-center">
                                        <span class="text-[10px] uppercase tracking-widest text-yellow-500 font-bold mb-2">Premium Artistry</span>
                                        <h1 class="font-serif text-4xl sm:text-5xl uppercase mb-4 font-bold tracking-[0.15em] whitespace-pre-line leading-tight">{HERO_SLIDES[heroIndex].title}</h1>
                                        <p class="text-xs max-w-md text-neutral-200 tracking-wide mb-6">{HERO_SLIDES[heroIndex].subtitle}</p>
                                    </div>
                                </section>

                                {/* Product Grid Showcase */}
                                <section class="py-12 px-6 max-w-7xl mx-auto">
                                    <div class="text-center mb-10">
                                        <span class="text-xs uppercase font-bold text-[#806B5F] tracking-[0.3em]">EXPLORE</span>
                                        <h2 class="text-2xl font-bold uppercase tracking-wider mt-1">OUR LINEUP</h2>
                                    </div>
                                    <div class="flex justify-center space-x-2 mb-8 overflow-x-auto no-scrollbar py-2">
                                        {["All", "Face", "Eyes", "Artistry"].map(cat => (
                                            <button key={cat} onClick={() => setActiveCategory(cat)} class={`px-5 py-2 text-[10px] font-bold uppercase tracking-wider ${activeCategory === cat ? 'bg-black text-white' : 'bg-white text-neutral-500 border border-neutral-200'}`}>
                                                {cat}
                                            </button>
                                        ))}
                                    </div>
                                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                                        {filteredProducts.map(prod => (
                                            <div key={prod.id} onClick={() => handleProductClick(prod.id)} class="group cursor-pointer bg-white overflow-hidden flex flex-col justify-between border border-neutral-100 rounded-sm shadow-sm hover:shadow-md transition-all">
                                                <div class="relative aspect-[4/5] bg-neutral-50 overflow-hidden">
                                                    <img src={prod.image} alt={prod.name} class="w-full h-full object-cover object-center transition-transform duration-500 group-hover:scale-105" />
                                                </div>
                                                <div class="p-4 flex flex-col flex-grow justify-between border-t border-neutral-50">
                                                    <div>
                                                        <span class="text-[9px] uppercase font-bold text-[#806B5F] tracking-[0.1em]">{prod.category}</span>
                                                        <h3 class="text-xs sm:text-sm font-semibold uppercase mt-0.5 truncate">{prod.name}</h3>
                                                    </div>
                                                    <div class="flex items-center justify-between mt-3 pt-2">
                                                        <span class="text-xs font-bold text-[#806B5F]">₦{prod.price.toLocaleString()}</span>
                                                        <span class="text-[9px] text-neutral-400 bg-neutral-50 border px-2 py-0.5 uppercase tracking-wider">View</span>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </section>
                            </div>
                        )}

                        {view === "detail" && selectedProduct && (
                            <section class="py-8 px-6 max-w-5xl mx-auto bg-white border border-neutral-200 my-6 rounded-sm">
                                <button onClick={() => setView("home")} class="text-[10px] font-bold uppercase text-neutral-400 hover:text-black mb-6 block tracking-[0.2em]">← Back to Shop</button>
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                                    <div class="aspect-[4/5] bg-neutral-50 border border-neutral-100 rounded-sm overflow-hidden">
                                        <img src={selectedProduct.image} alt={selectedProduct.name} class="w-full h-full object-cover" />
                                    </div>
                                    <div class="flex flex-col space-y-6">
                                        <div>
                                            <span class="text-[10px] uppercase font-bold text-[#806B5F] tracking-[0.2em]">{selectedProduct.category}</span>
                                            <h1 class="text-2xl font-bold uppercase tracking-wider mt-1 mb-2">{selectedProduct.name}</h1>
                                            <span class="text-xl font-bold text-[#806B5F]">₦{selectedProduct.price.toLocaleString()}</span>
                                        </div>
                                        <div class="border-t border-neutral-100 pt-4">
                                            <p class="text-xs text-neutral-600 leading-relaxed font-light">{selectedProduct.description}</p>
                                        </div>
                                        
                                        {selectedProduct.shades ? (
                                            <div class="space-y-4">
                                                <h3 class="text-[10px] uppercase font-bold text-neutral-400 tracking-[0.2em]">Select Shades <span class="text-neutral-400 normal-case">(Tap multiple)</span></h3>
                                                <div class="flex flex-wrap gap-2">
                                                    {selectedProduct.shades.map(s => {
                                                        const isSelected = !!detailSelectedShades[s];
                                                        return (
                                                            <button key={s} onClick={() => toggleShadeSelection(s)} class="w-8 h-8 rounded-full border border-neutral-300 relative transition-all" style={{ backgroundColor: s, ring: isSelected ? '2px solid black' : 'none', transform: isSelected ? 'scale(1.05)' : 'none' }}>
                                                                {isSelected && <span class="absolute inset-0 flex items-center justify-center bg-black/20 text-white font-bold text-[10px] rounded-full">✓</span>}
                                                            </button>
                                                        )
                                                    })}
                                                </div>
                                                {Object.keys(detailSelectedShades).length > 0 && (
                                                    <div class="border-t border-neutral-100 pt-3 space-y-2">
                                                        {Object.entries(detailSelectedShades).map(([s, qty]) => (
                                                            <div key={s} class="flex items-center justify-between bg-neutral-50 p-2 border border-neutral-100">
                                                                <div class="flex items-center space-x-2">
                                                                    <span class="w-3 h-3 rounded-full" style={{ backgroundColor: s }}></span>
                                                                    <span class="text-xs font-medium">{SHADE_NAMES[s] || s}</span>
                                                                </div>
                                                                <div class="flex items-center border border-neutral-300 bg-white">
                                                                    <button onClick={() => updateShadeQty(s, -1)} class="px-2 py-0.5 text-xs">-</button>
                                                                    <span class="w-8 text-center text-xs font-bold">{qty}</span>
                                                                    <button onClick={() => updateShadeQty(s, 1)} class="px-2 py-0.5 text-xs">+</button>
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                )}
                                            </div>
                                        ) : (
                                            <div class="space-y-2">
                                                <h3 class="text-[10px] uppercase font-bold text-neutral-400 tracking-[0.2em]">Quantity</h3>
                                                <div class="flex items-center w-28 border border-neutral-300 bg-white">
                                                    <button onClick={() => setDetailBaseQty(q => Math.max(1, q - 1))} class="px-3 py-1 text-xs">-</button>
                                                    <span class="flex-1 text-center text-xs font-bold">{detailBaseQty}</span>
                                                    <button onClick={() => setDetailBaseQty(q => q + 1)} class="px-3 py-1 text-xs">+</button>
                                                </div>
                                            </div>
                                        )}

                                        <div class="space-y-2 border-t border-neutral-100 pt-4">
                                            <button onClick={addToCart} class="w-full bg-black text-white text-[10px] font-bold uppercase py-4 tracking-[0.2em] flex items-center justify-center space-x-2 shadow-md">
                                                <span>Add To Shopping Cart</span>
                                            </button>
                                            <button onClick={directCheckout} class="w-full bg-green-500 text-white text-[10px] font-bold uppercase py-4 tracking-[0.2em] flex items-center justify-center space-x-2">
                                                <span>Order via WhatsApp Now</span>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </section>
                        )}

                        {view === "about" && (
                            <section class="max-w-4xl mx-auto px-6 py-16 text-center space-y-8">
                                <h1 class="font-serif text-3xl font-bold uppercase tracking-wider">Our Story</h1>
                                <p class="text-sm text-neutral-600 leading-relaxed font-light max-w-2xl mx-auto">
                                    Jaydriz Cosmetics is a trailblazing beauty brand designed for the modern makeup enthusiast who refuses to compromise on quality or cost. Merging high-performance formulas with trend-driven innovation, the brand delivers an inclusive, pro-level beauty experience that empowers self-expression for every skin tone and type.
                                </p>
                            </section>
                        )}

                        {view === "contact" && (
                            <section class="max-w-4xl mx-auto px-6 py-16 text-center space-y-6">
                                <h1 class="font-serif text-3xl font-bold uppercase tracking-wider">Visit Our Store</h1>
                                <p class="text-sm text-neutral-700">Shop B012, Rivers Plaza II, Lagos Trade Fair Plaza, Off Lagos - Badagry Expressway, Lagos, Nigeria.</p>
                                <p class="text-xs font-bold uppercase">WhatsApp Support: +234 803 539 9521</p>
                            </section>
                        )}
                    </main>

                    {/* Footer Layout */}
                    <footer class="bg-black text-white py-12 px-6 mt-16 text-center text-[10px] uppercase border-t border-neutral-900 tracking-wider">
                        <div class="max-w-4xl mx-auto mb-4 space-y-2">
                            <p class="text-yellow-400 font-bold">WhatsApp Support: +234 803 539 9521</p>
                            <p class="text-neutral-400 normal-case tracking-normal">Shop B012, Rivers Plaza II, Lagos Trade Fair Plaza, Off Lagos - Badagry Expressway, Lagos, Nigeria.</p>
                        </div>
                        <p class="text-neutral-500">© 2026 JAYDRIZ COSMETICS. All Luxury Rights Reserved.</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
